# Tests signal their intent via a sentinel agreementId:
#   "complete" -> data plane autonomously sends a /dataflow/completed callback after the transfer starts
#   "async"    -> data plane responds 202+transitional, then sends a started/prepared callback


dataspacetck.test.package=org.eclipse.dataspacetck.dps.verification.dataplane
dataspacetck.dps.dataplane.url=http://host.docker.internal:8282/api/v1

# pull provider side
DP_P_PULL_01_01_TRANSFERTYPE=http_pull_sync
DP_P_PULL_01_02_TRANSFERTYPE=http_pull_sync
DP_P_PULL_02_01_TRANSFERTYPE=http_pull_sync
DP_P_PULL_02_02_TRANSFERTYPE=http_pull_sync
DP_P_PULL_04_01_TRANSFERTYPE=http_pull_async
DP_P_PULL_04_01_AGREEMENTID=initiating-started

# pull consumer side
DP_C_PULL_01_01_TRANSFERTYPE=http_pull_sync
DP_C_PULL_01_02_TRANSFERTYPE=http_pull_sync
DP_C_PULL_02_01_TRANSFERTYPE=http_pull_sync
DP_C_PULL_02_02_TRANSFERTYPE=http_pull_sync
DP_C_PULL_03_01_TRANSFERTYPE=http_pull_sync
DP_C_PULL_03_01_AGREEMENTID=prepared-completed
DP_C_PULL_04_01_TRANSFERTYPE=http_pull_async
DP_C_PULL_04_01_AGREEMENTID=initiating-prepared

# push consumer side
DP_C_PUSH_01_01_TRANSFERTYPE=http_push_sync
DP_C_PUSH_01_02_TRANSFERTYPE=http_push_sync
DP_C_PUSH_02_01_TRANSFERTYPE=http_push_sync
DP_C_PUSH_02_02_TRANSFERTYPE=http_push_sync
DP_C_PUSH_03_01_TRANSFERTYPE=http_push_sync
DP_C_PUSH_04_01_TRANSFERTYPE=http_push_async
DP_C_PUSH_04_01_AGREEMENTID=initiating-prepared

# push provider side
DP_P_PUSH_01_01_TRANSFERTYPE=http_push_sync
DP_P_PUSH_01_02_TRANSFERTYPE=http_push_sync
DP_P_PUSH_02_01_TRANSFERTYPE=http_push_sync
DP_P_PUSH_02_02_TRANSFERTYPE=http_push_sync
DP_P_PUSH_03_01_TRANSFERTYPE=http_push_sync
DP_P_PUSH_03_01_AGREEMENTID=initiating-completed
DP_P_PUSH_04_01_TRANSFERTYPE=http_push_async
DP_P_PUSH_04_01_AGREEMENTID=initiating-started
